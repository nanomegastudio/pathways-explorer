<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pathways Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h1>Pathways Explorer</h1>
      <p>
        Start from the Discovery Phase and explore how domains, activities,
        education, and careers connect.
      </p>

      <h2>Node Details</h2>
      <div id="node-details">
        <div id="node-details-content">
          <p>Click a node to see more information here.</p>
        </div>
      </div>
    </div>

    <div id="graph-container">
      <div id="graph"></div>
    </div>
  </div>

  <!-- Debug overlay -->
  <div id="debug"></div>

  <!-- ForceGraph (self-hosted or CDN) -->
  <!-- If self-hosted, ensure lib/force-graph.min.js exists -->
  <script src="lib/force-graph.min.js"></script>

  <!-- Main script -->
  <script src="script.js"></script>
</body>
</html>
