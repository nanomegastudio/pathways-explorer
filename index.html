<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pathways Explorer</title>

  <!-- Vis.js Network -->
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app">
    <div id="sidebar">
      <h2>Node Details</h2>
      <div id="node-details">Click a node to explore</div>
    </div>

    <div id="graph">
      <div id="legend"></div>

      <div id="toolbar">
        <button class="tool-btn" id="toggle-icons">Toggle Icons</button>
        <button class="tool-btn" id="toggle-legend">Toggle Legend</button>
        <button class="tool-btn" id="toggle-radial">Radial Layout</button>
        <button class="tool-btn" id="guided-mode">Guided Mode</button>
        <button class="tool-btn" id="toggle-anim">Toggle Animations</button>
      </div>
    </div>
  </div>

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
