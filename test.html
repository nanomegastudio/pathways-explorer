<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ForceGraph Local Test</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
    }
    #graph {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="graph"></div>

  <!-- Load YOUR local UMD build -->
  <script src="lib/force-graph.min.js"></script>

  <script>
    console.log("ForceGraph loaded:", typeof ForceGraph);
    console.log("ForceGraph keys:", Object.keys(ForceGraph));

    // Minimal test data
    const data = {
      nodes: [
        { id: "A", name: "Node A" },
        { id: "B", name: "Node B" }
      ],
      links: [
        { source: "A", target: "B" }
      ]
    };

    const elem = document.getElementById("graph");

    // UMD build requires node-object links, so convert:
    const nodeMap = {};
    data.nodes.forEach(n => nodeMap[n.id] = n);
    data.links = data.links.map(l => ({
      source: nodeMap[l.source],
      target: nodeMap[l.target]
    }));

    const Graph = ForceGraph()(elem)
      .nodeId("id")
      .nodeLabel(n => n.name)
      .nodeColor(() => "#4f81bd");

    Graph.graphData(data);
    Graph.zoomToFit(400, 50);
  </script>
</body>
</html>
